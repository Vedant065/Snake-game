<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <h1>🐍 Snake Game</h1>

  <!-- HUD -->
  <div class="hud">
    <div>Score: <span id="score">0</span></div>
    <div>High Score: <span id="highScore">0</span></div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="overlay" class="overlay">
      <h2 id="overlayText">Press Start</h2>
      <button id="startBtn" onclick="startGame()">Start Game</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button onclick="togglePause()">⏸ Pause</button>
  </div>

 <div class="speed-control">
  <span>Speed:</span>
  <div class="speed-buttons">
    <button class="speed-btn" data-speed="180">🐢 Low</button>
    <button class="speed-btn active" data-speed="120">⚖️ Normal</button>
    <button class="speed-btn" data-speed="70">⚡ High</button>
  </div>
</div>

  <!-- Mobile Controls -->
  <div class="mobile-controls">
    <button onclick="setDirection('UP')">⬆️</button>
    <div>
      <button onclick="setDirection('LEFT')">⬅️</button>
      <button onclick="setDirection('DOWN')">⬇️</button>
      <button onclick="setDirection('RIGHT')">➡️</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
